mode: production
output: ./output
base_url: https://ancestry.bartfeenstra.com
content_negotiation: true
title: Lankester & Feenstra ancestries
author: Bart Feenstra
lifetime_threshold: 100
assets_directory_path: ./assets
theme:
  background_image_id: O0301
extensions:
  betty.extension.gramps.Gramps:
    family_trees:
      - file: ./input/ancestry.gramps
  betty.extension.deriver.Deriver: ~
  betty.extension.privatizer.Privatizer: ~
  betty.extension.anonymizer.Anonymizer: ~
  betty.extension.cleaner.Cleaner: ~
  betty.extension.wikipedia.Wikipedia: ~
  betty.extension.maps.Maps: ~
  betty.extension.redoc.ReDoc: ~
  betty.extension.trees.Trees: ~
  ancestry.extension.PublishPeople: ~
  ancestry.extension.PopulatePeople: ~
  betty.extension.nginx.Nginx:
    www_directory_path: /var/www/betty/
    https: false
locales:
  - locale: en-US
    alias: en
  - locale: nl-NL
    alias: nl
  - locale: uk
